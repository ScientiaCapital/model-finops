[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "langgraph-cost-optimizer"
version = "0.1.0"
description = "Cost tracking and budget enforcement middleware for LangGraph multi-agent applications"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    { name = "Scientia Capital", email = "dev@scientiacapital.com" }
]
keywords = ["langgraph", "langchain", "llm", "cost-tracking", "budget", "ai"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]
sqlite = [
    "aiosqlite>=0.19.0",
]
all = [
    "langgraph-cost-optimizer[dev,sqlite]",
]

[project.urls]
Homepage = "https://github.com/scientiacapital/ai-cost-optimizer"
Documentation = "https://github.com/scientiacapital/ai-cost-optimizer#readme"
Repository = "https://github.com/scientiacapital/ai-cost-optimizer"

[tool.hatch.build.targets.wheel]
packages = ["src/langgraph_cost_optimizer"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
